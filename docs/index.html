<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaxSuite — フリーランスの経費管理アプリ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
      background: #fff;
      color: #1d1d1f;
    }
    .hero {
      text-align: center;
      padding: 80px 24px 60px;
    }
    .hero h1 {
      font-size: 48px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 16px;
    }
    .hero p {
      font-size: 18px;
      color: #6e6e73;
      max-width: 480px;
      margin: 0 auto 36px;
      line-height: 1.6;
    }
    .btn {
      display: inline-block;
      background: #1d1d1f;
      color: #fff;
      padding: 14px 32px;
      border-radius: 980px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
    }
    .btn:hover { background: #3a3a3c; }
    .links {
      text-align: center;
      padding: 40px 24px 80px;
    }
    .links a {
      font-size: 14px;
      color: #6e6e73;
      text-decoration: none;
      margin: 0 16px;
    }
    .links a:hover { color: #0071e3; }
  </style>
</head>
<body>
  <div class="hero">
    <h1>TaxSuite</h1>
    <p>フリーランス・個人事業主のための<br>シンプルな経費・収入管理アプリ。</p>
    <a class="btn" href="https://apps.apple.com/app/taxsuite" target="_blank">App Store でダウンロード</a>
  </div>
  <div class="links">
    <a href="privacy.html">プライバシーポリシー</a>

</html>
